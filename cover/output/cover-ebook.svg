<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="1600" height="2560" 
     viewBox="0 0 1600 2560">
    
    <!-- Definitions -->
    <defs>
        <!-- Background gradient -->
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#FAFAFA"/>
            <stop offset="50%" style="stop-color:#F0F0F0"/>
            <stop offset="100%" style="stop-color:#E8E8E8"/>
        </linearGradient>
        
        <!-- Plant stem gradient -->
        <linearGradient id="stemGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#4CAF50"/>
            <stop offset="100%" style="stop-color:#388E3C"/>
        </linearGradient>
        
        <!-- Leaf gradient -->
        <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#66BB6A"/>
            <stop offset="50%" style="stop-color:#43A047"/>
            <stop offset="100%" style="stop-color:#2E7D32"/>
        </linearGradient>
        
        <!-- Hand gradient -->
        <linearGradient id="handGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#E8C4A8"/>
            <stop offset="100%" style="stop-color:#D4A574"/>
        </linearGradient>
        
        <!-- Crack gradient -->
        <linearGradient id="crackGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:transparent"/>
            <stop offset="10%" style="stop-color:#D0D0D0"/>
            <stop offset="50%" style="stop-color:#C0C0C0"/>
            <stop offset="90%" style="stop-color:#D0D0D0"/>
            <stop offset="100%" style="stop-color:transparent"/>
        </linearGradient>
    </defs>
    
    <!-- Background -->
    <rect width="1600" height="2560" fill="url(#bgGradient)"/>
    
    <!-- Subtle radial glow -->
    <circle cx="320.0" cy="768.0" r="600" fill="rgba(76, 175, 80, 0.03)"/>
    <circle cx="1280.0" cy="1792.0" r="500" fill="rgba(76, 175, 80, 0.02)"/>
    
    <!-- Title -->
    <text x="800.0" y="320" 
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif" 
          font-size="142" font-weight="200" 
          fill="#1A1A1A" text-anchor="middle"
          letter-spacing="28">THE GENTLE</text>
    <text x="800.0" y="480" 
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif" 
          font-size="142" font-weight="200" 
          fill="#1A1A1A" text-anchor="middle"
          letter-spacing="28">CONQUEST</text>
    
    <!-- Decorative line -->
    <line x1="700.0" y1="540" x2="900.0" y2="540" 
          stroke="#999" stroke-width="1" opacity="0.5"/>
    
    <!-- Subtitle -->
    <text x="800.0" y="600" 
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif" 
          font-size="42" font-weight="300" 
          fill="#666666" text-anchor="middle"
          letter-spacing="18">A NOVEL</text>
    
    <!-- The Crack -->
    <rect x="796.0" y="1080.0" width="8" height="400" 
          fill="url(#crackGradient)"/>
    <rect x="798.0" y="1080.0" width="4" height="400" 
          fill="#909090" opacity="0.6"/>
    
    <!-- The Plant -->
    <!-- Stem -->
    <rect x="797.0" y="1200.0" width="6" height="180" 
          fill="url(#stemGradient)" rx="3"/>
    
    <!-- Bud -->
    <ellipse cx="800.0" cy="1180.0" rx="12" ry="16" 
             fill="#4CAF50"/>
    
    <!-- Leaves - Left side -->
    <ellipse cx="750.0" cy="1220.0" rx="40" ry="20" 
             fill="url(#leafGradient)" transform="rotate(-30 750.0 1220.0)"/>
    <ellipse cx="755.0" cy="1260.0" rx="38" ry="18" 
             fill="url(#leafGradient)" transform="rotate(-20 755.0 1260.0)"/>
    <ellipse cx="745.0" cy="1300.0" rx="42" ry="20" 
             fill="url(#leafGradient)" transform="rotate(-40 745.0 1300.0)"/>
    
    <!-- Leaves - Right side -->
    <ellipse cx="850.0" cy="1220.0" rx="40" ry="20" 
             fill="url(#leafGradient)" transform="rotate(30 850.0 1220.0)"/>
    <ellipse cx="845.0" cy="1260.0" rx="38" ry="18" 
             fill="url(#leafGradient)" transform="rotate(20 845.0 1260.0)"/>
    <ellipse cx="855.0" cy="1300.0" rx="42" ry="20" 
             fill="url(#leafGradient)" transform="rotate(40 855.0 1300.0)"/>
    
    <!-- The Hand -->
    <!-- Palm -->
    <ellipse cx="800.0" cy="1560.0" rx="100" ry="60" 
             fill="url(#handGradient)"/>
    
    <!-- Fingers -->
    <rect x="720.0" y="1420.0" width="22" height="80" 
          fill="url(#handGradient)" rx="11" transform="rotate(25 731.0 1460.0)"/>
    <rect x="750.0" y="1400.0" width="20" height="100" 
          fill="url(#handGradient)" rx="10" transform="rotate(8 760.0 1450.0)"/>
    <rect x="790.0" y="1395.0" width="20" height="105" 
          fill="url(#handGradient)" rx="10" transform="rotate(2 800.0 1447.0)"/>
    <rect x="830.0" y="1400.0" width="19" height="95" 
          fill="url(#handGradient)" rx="10" transform="rotate(-4 839.0 1447.0)"/>
    <rect x="860.0" y="1415.0" width="18" height="75" 
          fill="url(#handGradient)" rx="9" transform="rotate(-12 869.0 1452.0)"/>
    
    <!-- Decorative line -->
    <line x1="700.0" y1="2260" x2="900.0" y2="2260" 
          stroke="#999" stroke-width="1" opacity="0.5"/>
    
    <!-- Author -->
    <text x="800.0" y="2340" 
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif" 
          font-size="52" font-weight="300" 
          fill="#1A1A1A" text-anchor="middle"
          letter-spacing="24">MATT JHAGEN</text>
    
</svg>